<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <h2 class="sidebar-title">History</h2>
            <ul id="historyList" class="history-list"></ul>
        </aside>
        <div class="app">
            <header class="app-header">
                <h1>Chat</h1>
                <button id="newChatBtn" class="btn secondary">New Chat</button>
            </header>
            <main class="chat-window">
                <div id="chatBox" class="messages"></div>
            </main>
            <div class="composer">
                <input id="userInput" type="text" class="input" placeholder="Type your message here..." />
                <button id="sendBtn" class="btn primary">Send</button>
            </div>
            <div class="attribution">
                Created with 💙 using JavaScript
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
